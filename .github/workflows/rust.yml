name: Rust CI

on:
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * *"
  push:
    branches: [main]
    paths:
      - "seej/server/**"
      - ".github/workflows/rust.yml"
  pull_request:
    branches: [main]
    paths:
      - "seej/server/**"
      - ".github/workflows/rust.yml"

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

defaults:
  run:
    working-directory: seej/server

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@1.95.0
        with:
          components: clippy, rustfmt

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            seej/server/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('seej/server/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Check compilation
        run: cargo check --workspace --all-targets

  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@1.95.0
        with:
          components: rustfmt

      - name: Check formatting
        run: cargo fmt --all -- --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@1.95.0
        with:
          components: clippy

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            seej/server/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('seej/server/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Run Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@1.95.0

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            seej/server/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('seej/server/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Run tests
        run: cargo test --workspace --all-targets

  phase1-ignored:
    name: Phase 1 ignored tests
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@1.95.0

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            seej/server/target
          key: ${{ runner.os }}-cargo-ignored-${{ hashFiles('seej/server/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-ignored-
            ${{ runner.os }}-cargo-

      - name: Run ignored Phase 1 tests
        run: cargo test --workspace --all-targets -- --ignored

  # Build on multiple platforms
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@1.95.0

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            seej/server/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('seej/server/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Build release
        run: cargo build --workspace --release

  # Documentation
  doc:
    name: Documentation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@1.95.0

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            seej/server/target
          key: ${{ runner.os }}-cargo-doc-${{ hashFiles('seej/server/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-doc-

      - name: Build documentation
        run: cargo doc --workspace --no-deps
        env:
          RUSTDOCFLAGS: -D warnings

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@1.95.0
        with:
          components: llvm-tools-preview

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Run coverage
        run: cargo llvm-cov -p sy_core -p sy_infra --all-targets --fail-under-lines 70

  supply-chain:
    name: Supply chain
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@1.95.0

      - name: Audit dependencies
        uses: actions-rust-lang/audit@v1
        with:
          workingDirectory: seej/server

      - name: Install cargo-deny
        uses: taiki-e/install-action@cargo-deny

      - name: Check dependency policy
        run: cargo deny check advisories licenses sources
        working-directory: seej/server

      - name: Check architectural dependency rules
        run: |
          python - <<'PY'
          import json
          import pathlib
          import subprocess
          import sys

          metadata = json.loads(subprocess.check_output([
              "cargo", "metadata", "--format-version", "1", "--no-deps"
          ], text=True))
          packages = {pkg["name"]: pkg for pkg in metadata["packages"]}

          def deps(name):
              return {
                  dep["name"]
                  for dep in packages[name]["dependencies"]
                  if dep.get("kind") is None
              }

          errors = []
          if deps("sy_core") != {"sy_types", "sy_api"}:
              errors.append(f"sy_core deps must be exactly sy_types, sy_api; got {sorted(deps('sy_core'))}")
          for path in [
              "crates/sy_core/src/ports/event_log.rs",
              "crates/sy_core/src/ports/store.rs",
          ]:
              if pathlib.Path(path).exists():
                  errors.append(f"sy_core must not own persistence port file: {path}")
          if "sy_protocol" in deps("sy_api"):
              errors.append("sy_api must not depend on sy_protocol")
          if "sy_protocol" in deps("sy_infra"):
              errors.append("sy_infra must not depend on sy_protocol in Phase 1")
          for name in packages:
              if name.startswith("mod_") and "sy_core" in deps(name):
                  errors.append(f"{name} must not depend on sy_core")

          if errors:
              print("\n".join(errors), file=sys.stderr)
              sys.exit(1)
          PY

  wal-fuzz-build:
    name: WAL fuzz build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust nightly
        uses: dtolnay/rust-toolchain@nightly

      - name: Install cargo-fuzz
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-fuzz

      - name: Verify cargo-fuzz install
        run: cargo-fuzz --version

      - name: Build WAL fuzz targets
        run: cargo +nightly fuzz build --dev --target x86_64-unknown-linux-gnu
        working-directory: seej/server/crates/sy_infra/fuzz

  wal-fuzz:
    name: WAL fuzz smoke
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust nightly
        uses: dtolnay/rust-toolchain@nightly

      - name: Install cargo-fuzz
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-fuzz

      - name: Verify cargo-fuzz install
        run: cargo-fuzz --version

      - name: Fuzz WAL decoder
        run: cargo +nightly fuzz run --target x86_64-unknown-linux-gnu decode_record -- -max_total_time=180
        working-directory: seej/server/crates/sy_infra/fuzz

      - name: Fuzz WAL round-trip
        run: cargo +nightly fuzz run --target x86_64-unknown-linux-gnu wal_round_trip -- -max_total_time=180
        working-directory: seej/server/crates/sy_infra/fuzz
